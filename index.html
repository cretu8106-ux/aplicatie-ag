<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferma Mea</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f5f0;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e0e0d8;padding:12px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:5}
header h1{font-size:18px;font-weight:600;color:#1a1a1a}
.status-dot{width:8px;height:8px;border-radius:50%;background:#639922;margin-left:auto}
.status-dot.loading{background:#854F0B}
.status-dot.error{background:#A32D2D}
.status-text{font-size:12px;color:#888;margin-left:6px}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
.nav{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:12px;padding:6px;border:1px solid #e0e0d8}
.nav-btn{flex:1;padding:8px 12px;border:none;background:none;cursor:pointer;font-size:13px;color:#888;border-radius:8px;font-family:inherit;transition:all 0.15s}
.nav-btn.active{background:#EAF3DE;color:#3B6D11;font-weight:600}
.tab{display:none}.tab.active{display:block}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.metric{background:#fff;border-radius:10px;padding:14px;border:1px solid #e0e0d8}
.metric-label{font-size:11px;color:#888;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px}
.metric-value{font-size:24px;font-weight:700}
.metric-sub{font-size:11px;color:#aaa;margin-top:2px}
.card{background:#fff;border-radius:12px;border:1px solid #e0e0d8;padding:16px;margin-bottom:16px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.section-header h2{font-size:15px;font-weight:600}
.btn-add{padding:7px 16px;border:1px solid #3B6D11;border-radius:8px;background:#EAF3DE;cursor:pointer;font-size:13px;color:#3B6D11;font-weight:500;font-family:inherit}
.btn-add:hover{background:#d4ebbb}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:600;color:#888;border-bottom:1px solid #f0f0e8;font-size:11px;text-transform:uppercase}
td{padding:10px 10px;border-bottom:1px solid #f0f0e8;color:#1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf5}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-teal{background:#E1F5EE;color:#0F6E56}
.btn-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:14px;padding:2px 6px;border-radius:4px}
.btn-del:hover{color:#A32D2D;background:#FCEBEB}
.btn-edit{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px}
.btn-edit:hover{background:#E6F1FB}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.12)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;color:#888;margin-bottom:4px;font-weight:500}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #e0e0d8;border-radius:8px;background:#fafaf5;color:#1a1a1a;font-size:14px;font-family:inherit}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#639922}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-cancel{padding:8px 16px;border:1px solid #e0e0d8;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#888;font-family:inherit}
.btn-save{padding:8px 18px;border:1px solid #3B6D11;border-radius:8px;background:#EAF3DE;cursor:pointer;font-size:13px;color:#3B6D11;font-weight:600;font-family:inherit}
.btn-save:hover{background:#d4ebbb}
.tasks-list{display:flex;flex-direction:column;gap:8px}
.task-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #e0e0d8;border-radius:10px;background:#fff;transition:opacity 0.2s}
.task-item.done{opacity:0.45}
.task-item.done .task-title{text-decoration:line-through}
.task-cb{width:18px;height:18px;cursor:pointer;accent-color:#3B6D11}
.task-info{flex:1}
.task-title{font-size:13px;font-weight:600}
.task-meta{font-size:11px;color:#aaa;margin-top:2px}
.land-bar{background:#f0f0e8;border-radius:4px;height:6px;margin-top:5px;overflow:hidden}
.land-bar-fill{height:100%;border-radius:4px;background:#639922;transition:width 0.3s}
.empty{text-align:center;padding:2rem;color:#aaa;font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <div style="font-size:22px">🌾</div>
  <h1>Ferma Mea</h1>
  <div style="display:flex;align-items:center;gap:6px;margin-left:auto">
    <div class="status-dot loading" id="status-dot"></div>
    <span class="status-text" id="status-text">Se conectează...</span>
  </div>
</header>

<div class="container">
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('animale')">🐄 Animale</button>
    <button class="nav-btn" onclick="switchTab('terenuri')">🌱 Terenuri</button>
    <button class="nav-btn" onclick="switchTab('sarcini')">✅ Sarcini</button>
  </div>

  <!-- ANIMALE -->
  <div class="tab active" id="tab-animale">
    <div class="metrics" id="animal-metrics"></div>
    <div class="card">
      <div class="section-header">
        <h2>Lista animale</h2>
        <button class="btn-add" onclick="openModal('animal')">+ Adaugă animal</button>
      </div>
      <table>
        <thead><tr><th>ID</th><th>Nume</th><th>Tip</th><th>Vârstă</th><th>Sănătate</th><th>Greutate</th><th>Acțiuni</th></tr></thead>
        <tbody id="animal-table"><tr><td colspan="7" class="empty">Se încarcă...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- TERENURI -->
  <div class="tab" id="tab-terenuri">
    <div class="metrics" id="teren-metrics"></div>
    <div class="card">
      <div class="section-header">
        <h2>Parcele agricole</h2>
        <button class="btn-add" onclick="openModal('teren')">+ Adaugă teren</button>
      </div>
      <table>
        <thead><tr><th>Tarlă</th><th>Parcelă</th><th>Suprafață</th><th>Cultură</th><th>Status</th><th>Utilizare</th><th></th></tr></thead>
        <tbody id="teren-table"><tr><td colspan="7" class="empty">Se încarcă...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- SARCINI -->
  <div class="tab" id="tab-sarcini">
    <div class="metrics" id="task-metrics"></div>
    <div class="card">
      <div class="section-header">
        <h2>Sarcini pentru azi</h2>
        <button class="btn-add" onclick="openModal('task')">+ Adaugă sarcină</button>
      </div>
      <div class="tasks-list" id="task-list"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Adaugă</h3>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Anulează</button>
      <button class="btn-save" onclick="saveModal()">Salvează</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPA_URL='https://dycabxrgczvpgwjuhxml.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5Y2FieHJnY3p2cGd3anVoeG1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNzU4NjAsImV4cCI6MjA4OTk1MTg2MH0.W93uefHzEoHvcLrLTyG0ofyg2OL4-3rOcsEax3bZUgQ';
var sb=supabase.createClient(SUPA_URL,SUPA_KEY);
var animals=[],terenuri=[],tasks=[],currentModal='';

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function setStatus(msg,type){document.getElementById('status-text').textContent=msg;var d=document.getElementById('status-dot');d.className='status-dot'+(type?' '+type:'')}

async function loadAll(){
  try{
    setStatus('Se conectează...','loading');
    var[r1,r2,r3]=await Promise.all([sb.from('animale').select('*'),sb.from('terenuri').select('*'),sb.from('sarcini').select('*')]);
    if(r1.error)throw r1.error;
    animals=r1.data||[];terenuri=r2.data||[];tasks=r3.data||[];
    setStatus('Conectat','');
    renderAnimals();renderTerenuri();renderTasks();
  }catch(e){setStatus('Eroare conexiune','error');console.error(e)}
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  var i={animale:0,terenuri:1,sarcini:2}[name];
  document.querySelectorAll('.nav-btn')[i].classList.add('active');
}

function hb(h){if(h==='Excelent')return`<span class="badge badge-green">${h}</span>`;if(h==='Bun')return`<span class="badge badge-blue">${h}</span>`;return`<span class="badge badge-red">${h}</span>`}
function sb2(s){if(s==='Cultivat')return`<span class="badge badge-green">${s}</span>`;if(s==='Recoltare')return`<span class="badge badge-amber">${s}</span>`;return`<span class="badge badge-teal">${s}</span>`}

function renderAnimals(){
  var tb=document.getElementById('animal-table');
  if(!animals.length){tb.innerHTML='<tr><td colspan="7" class="empty">Niciun animal adăugat încă. Apasă + Adaugă animal!</td></tr>';return}
  tb.innerHTML=animals.map(a=>`<tr><td style="color:#aaa;font-size:12px">${a.id}</td><td><strong>${a.name}</strong></td><td>${a.type}</td><td>${a.age} ani</td><td>${hb(a.health)}</td><td>${a.weight} kg</td><td><button class="btn-edit" onclick="editAnimal('${a.id}')">✏️</button><button class="btn-del" onclick="delAnimal('${a.id}')">✕</button></td></tr>`).join('');
  var types={};animals.forEach(a=>{types[a.type]=(types[a.type]||0)+1});
  document.getElementById('animal-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total animale</div><div class="metric-value">${animals.length}</div></div>
    <div class="metric"><div class="metric-label">Sănătate excelentă</div><div class="metric-value">${animals.filter(a=>a.health==='Excelent').length}</div><div class="metric-sub">din ${animals.length}</div></div>
    <div class="metric"><div class="metric-label">Tipuri</div><div class="metric-value">${Object.keys(types).length}</div></div>
    <div class="metric"><div class="metric-label">Necesită atenție</div><div class="metric-value" style="color:#A32D2D">${animals.filter(a=>a.health==='Slab').length}</div></div>`;
}

function renderTerenuri(){
  var tb=document.getElementById('teren-table');
  if(!terenuri.length){tb.innerHTML='<tr><td colspan="7" class="empty">Nicio parcelă adăugată încă. Apasă + Adaugă teren!</td></tr>';return}
  tb.innerHTML=terenuri.map(t=>`<tr><td style="color:#aaa;font-size:12px">${t.id}</td><td><strong>${t.name}</strong></td><td>${t.area} ha</td><td>${t.crop}</td><td>${sb2(t.status)}</td><td><div style="font-size:12px;color:#aaa">${t.used}%</div><div class="land-bar"><div class="land-bar-fill" style="width:${t.used}%"></div></div></td><td><button class="btn-del" onclick="delTeren('${t.id}')">✕</button></td></tr>`).join('');
  var total=terenuri.reduce((s,t)=>s+parseFloat(t.area),0);
  document.getElementById('teren-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Suprafață totală</div><div class="metric-value">${total.toFixed(1)} ha</div></div>
    <div class="metric"><div class="metric-label">Parcele active</div><div class="metric-value">${terenuri.filter(t=>t.status==='Cultivat').length}</div></div>
    <div class="metric"><div class="metric-label">Culturi</div><div class="metric-value">${[...new Set(terenuri.map(t=>t.crop))].length}</div></div>
    <div class="metric"><div class="metric-label">Utilizare medie</div><div class="metric-value">${terenuri.length?Math.round(terenuri.reduce((s,t)=>s+t.used,0)/terenuri.length):0}%</div></div>`;
}

function renderTasks(){
  var list=document.getElementById('task-list');
  if(!tasks.length){list.innerHTML='<div class="empty">Nicio sarcină adăugată încă. Apasă + Adaugă sarcină!</div>';return}
  list.innerHTML=tasks.map(t=>`<div class="task-item ${t.done?'done':''}"><input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleTask(${t.id})"><div class="task-info"><div class="task-title">${t.title}</div><div class="task-meta">${t.meta}</div></div><span class="badge ${t.prio==='urgent'?'badge-red':t.prio==='normal'?'badge-blue':'badge-teal'}">${t.prio}</span><button class="btn-del" onclick="delTask(${t.id})">✕</button></div>`).join('');
  var done=tasks.filter(t=>t.done).length;
  document.getElementById('task-metrics').innerHTML=`
    <div class="metric"><div class="metric-label">Total sarcini</div><div class="metric-value">${tasks.length}</div></div>
    <div class="metric"><div class="metric-label">Finalizate</div><div class="metric-value" style="color:#3B6D11">${done}</div></div>
    <div class="metric"><div class="metric-label">În așteptare</div><div class="metric-value">${tasks.length-done}</div></div>
    <div class="metric"><div class="metric-label">Urgente rămase</div><div class="metric-value" style="color:#A32D2D">${tasks.filter(t=>t.prio==='urgent'&&!t.done).length}</div></div>`;
}

function openModal(type){
  currentModal=type;
  document.getElementById('modal-title').textContent=type==='animal'?'Adaugă animal':type==='teren'?'Adaugă teren':'Adaugă sarcină';
  var f=document.getElementById('modal-fields');
  if(type==='animal'){
    f.innerHTML=`
      <div class="form-group"><label>ID (ex: A001)</label><input id="f-id" placeholder="A001"></div>
      <div class="form-group"><label>Nume animal</label><input id="f-name" placeholder="ex: Bella"></div>
      <div class="form-group"><label>Tip</label><select id="f-type"><option>Vacă</option><option>Taur</option><option>Oaie</option><option>Capră</option><option>Porc</option><option>Cal</option><option>Găină</option></select></div>
      <div class="form-group"><label>Vârstă (ani)</label><input id="f-age" type="number" min="0" value="1"></div>
      <div class="form-group"><label>Sănătate</label><select id="f-health"><option>Excelent</option><option>Bun</option><option>Slab</option></select></div>
      <div class="form-group"><label>Greutate (kg)</label><input id="f-weight" type="number" value="100"></div>`;
  } else if(type==='teren'){
    f.innerHTML=`
      <div class="form-group"><label>Tarlă (ex: T01)</label><input id="f-id" placeholder="T01"></div>
      <div class="form-group"><label>Parcelă (ex: Câmpul Nord)</label><input id="f-name" placeholder="ex: Câmpul Nord"></div>
      <div class="form-group"><label>Suprafață (ha)</label><input id="f-area" type="number" step="0.1" value="5"></div>
      <div class="form-group"><label>Cultură</label><select id="f-crop"><option>Grâu</option><option>Porumb</option><option>Lucernă</option><option>Floarea-soarelui</option><option>Legume</option><option>Orz</option></select></div>
      <div class="form-group"><label>Status</label><select id="f-status"><option>Cultivat</option><option>Recoltare</option><option>Pregătire</option></select></div>
      <div class="form-group"><label>Utilizare (%)</label><input id="f-used" type="number" min="0" max="100" value="50"></div>`;
  } else {
    f.innerHTML=`
      <div class="form-group"><label>Titlu sarcină</label><input id="f-title" placeholder="ex: Hrănit animale"></div>
      <div class="form-group"><label>Detalii / oră</label><input id="f-meta" placeholder="ex: 08:00 · Adăpost"></div>
      <div class="form-group"><label>Prioritate</label><select id="f-prio"><option value="urgent">Urgent</option><option value="normal" selected>Normal</option><option value="scăzut">Scăzut</option></select></div>`;
  }
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(){document.getElementById('modal-bg').classList.remove('open')}

async function saveModal(){
  try{
    if(currentModal==='animal-edit'){
      var id=document.getElementById('f-id').value;
      var obj={name:document.getElementById('f-name').value,type:document.getElementById('f-type').value,age:+document.getElementById('f-age').value,health:document.getElementById('f-health').value,weight:+document.getElementById('f-weight').value};
      var{error}=await sb.from('animale').update(obj).eq('id',id);
      if(error)throw error;
      var i=animals.findIndex(a=>a.id===id);
      animals[i]={...animals[i],...obj};
      renderAnimals();toast('Animal actualizat!');closeModal();return;
    }
    if(currentModal==='animal'){
      var obj={id:document.getElementById('f-id').value,name:document.getElementById('f-name').value,type:document.getElementById('f-type').value,age:+document.getElementById('f-age').value,health:document.getElementById('f-health').value,weight:+document.getElementById('f-weight').value};
      var{error}=await sb.from('animale').insert(obj);
      if(error)throw error;
      animals.push(obj);renderAnimals();
    } else if(currentModal==='teren'){
      var obj={id:document.getElementById('f-id').value,name:document.getElementById('f-name').value,area:+document.getElementById('f-area').value,crop:document.getElementById('f-crop').value,status:document.getElementById('f-status').value,used:+document.getElementById('f-used').value};
      var{error}=await sb.from('terenuri').insert(obj);
      if(error)throw error;
      terenuri.push(obj);renderTerenuri();
    } else {
      var obj={title:document.getElementById('f-title').value,meta:document.getElementById('f-meta').value,prio:document.getElementById('f-prio').value,done:false};
      var{data,error}=await sb.from('sarcini').insert(obj).select();
      if(error)throw error;
      tasks.push(data[0]);renderTasks();
    }
    toast('Salvat cu succes!');
    closeModal();
  }catch(e){toast('Eroare: '+e.message)}
}

function editAnimal(id){
  var a=animals.find(a=>a.id===id);
  if(!a)return;
  currentModal='animal-edit';
  document.getElementById('modal-title').textContent='Editează animal';
  var f=document.getElementById('modal-fields');
  f.innerHTML=`
    <div class="form-group"><label>ID</label><input id="f-id" value="${a.id}" disabled style="opacity:0.5"></div>
    <div class="form-group"><label>Nume animal</label><input id="f-name" value="${a.name}"></div>
    <div class="form-group"><label>Tip</label><select id="f-type">
      <option ${a.type==='Vacă'?'selected':''}>Vacă</option>
      <option ${a.type==='Taur'?'selected':''}>Taur</option>
      <option ${a.type==='Oaie'?'selected':''}>Oaie</option>
      <option ${a.type==='Capră'?'selected':''}>Capră</option>
      <option ${a.type==='Țap'?'selected':''}>Țap</option>
      <option ${a.type==='Berbec'?'selected':''}>Berbec</option>
      <option ${a.type==='Porc'?'selected':''}>Porc</option>
      <option ${a.type==='Cal'?'selected':''}>Cal</option>
      <option ${a.type==='Găină'?'selected':''}>Găină</option>
    </select></div>
    <div class="form-group"><label>Vârstă (ani)</label><input id="f-age" type="number" value="${a.age}"></div>
    <div class="form-group"><label>Sănătate</label><select id="f-health">
      <option ${a.health==='Excelent'?'selected':''}>Excelent</option>
      <option ${a.health==='Bun'?'selected':''}>Bun</option>
      <option ${a.health==='Slab'?'selected':''}>Slab</option>
    </select></div>
    <div class="form-group"><label>Greutate (kg)</label><input id="f-weight" type="number" value="${a.weight}"></div>`;
  document.getElementById('modal-bg').classList.add('open');
}

async function delAnimal(id){if(!confirm('Ștergi animalul?'))return;var{error}=await sb.from('animale').delete().eq('id',id);if(!error){animals=animals.filter(a=>a.id!==id);renderAnimals();toast('Animal șters')}}
async function delTeren(id){if(!confirm('Ștergi parcela?'))return;var{error}=await sb.from('terenuri').delete().eq('id',id);if(!error){terenuri=terenuri.filter(t=>t.id!==id);renderTerenuri();toast('Parcelă ștearsă')}}
async function delTask(id){var{error}=await sb.from('sarcini').delete().eq('id',id);if(!error){tasks=tasks.filter(t=>t.id!==id);renderTasks();toast('Sarcină ștearsă')}}
async function toggleTask(id){var t=tasks.find(t=>t.id===id);if(!t)return;t.done=!t.done;await sb.from('sarcini').update({done:t.done}).eq('id',id);renderTasks()}

loadAll();
</script>
</body>
</html>
